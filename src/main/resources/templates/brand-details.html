<!doctype html>
<html lang="en">
<head th:replace="~{fragments/header::head}">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light">

<header th:insert="~{fragments/navbar::navigationBar}"></header>

<main th:if="${brand}" th:object="${brand}">

    <!-- TOOLBAR -->
    <div class="py-2 px-3 bg-success">
        <div class="container-fluid d-flex align-items-center justify-content-between gap-2 flex-wrap">
            <a class="btn btn-outline-light btn-sm rounded-3" th:href="@{/home}">← Terug</a>
        </div>
    </div>

    <div class="container-fluid px-3 px-md-4 py-4">
        <div class="row g-4 align-items-start">

            <!-- BRAND IMAGE -->
            <div class="col-12 col-md-4">
                <div class="bg-white rounded-3 shadow-sm overflow-hidden">
                    <img th:src="@{|https://placehold.co/600x400/e8f5e9/2d6a4f?font=open-sans&text=${brand.getName()}|}"
                         alt="Brand" class="w-100 object-fit-cover" style="aspect-ratio: 4/3;">
                </div>
            </div>

            <!-- BRAND INFO -->
            <div class="col-12 col-md-8">
                <div class="bg-white rounded-3 shadow-sm p-4">

                    <h1 class="fw-bold mb-1" th:text="*{name}"></h1>
                    <p class="fst-italic text-secondary mb-1" th:text="*{slogan}"></p>
                    <p class="text-muted small mb-4" th:text="|Opgericht in *{foundingYear}|"></p>

                    <h6 class="fw-bold text-uppercase text-secondary small mb-3">Producten in assortiment</h6>

                    <div class="row row-cols-2 row-cols-sm-3 row-cols-md-4 g-3">
                        <div class="col" th:each="product : *{products}">
                            <a class="text-decoration-none"
                               th:href="@{/product-details/{id}(id=${product.id})}">
                                <div class="bg-light rounded-3 p-3 h-100 border border-1">
                                    <img th:src="@{${product.imageUrl}}"
                                         alt="product" class="w-100 rounded-2 object-fit-cover mb-2"
                                         style="aspect-ratio: 4/3;">
                                    <p class="fw-semibold small text-dark mb-1"
                                       th:text="${product.productName}"></p>
                                    <p class="fw-bold text-success small mb-0"
                                       th:text="|€ ${product.price}|"></p>
                                </div>
                            </a>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

</main>

<main th:unless="${brand}" class="container py-5 text-center">
    <h4 class="text-muted">Geen geldig merk geselecteerd.</h4>
    <a class="btn btn-success rounded-3 mt-3" th:href="@{/home}">Terug naar overzicht</a>
</main>

<footer class="bg-dark text-white text-center py-4 mt-5">
    <small class="text-white-50">© 2025 Freshly — Vers aan jouw deur.</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
