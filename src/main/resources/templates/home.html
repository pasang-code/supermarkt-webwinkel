<!doctype html>
<html lang="en">
<head th:replace="~{fragments/header::head}"></head>
<body class="bg-secondary">

<header th:insert="~{fragments/navbar::navigationBar}"></header>

<main class="py-5">

    <!-- FILTER MODAL -->
    <div class="modal" id="modal1" tabindex="-1">
        <div class="modal-dialog" style="max-width: 85vw;">
            <form id="form1" th:action="@{/home}" method="GET">
                <div class="modal-content">

                    <div class="modal-header">
                        <h2 class="modal-title">Filters</h2>
                    </div>

                    <div class="modal-body">

                        <div class="row">
                            <h3>naam</h3>
                            <div class="col">
                                <div class="input-group">
                                    <input type="search" name="naam">
                                    <span class="ms-2">naam</span>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <h3>gewicht</h3>
                            <div class="col-auto">
                                <div class="input-group">
                                    <input type="number" class="form-control" name="gewicht" th:value="${param.gewicht}">
                                    <span class="ms-2">gram</span>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <h3>prijs</h3>
                            <div class="col-auto">
                                <div class="input-group">
                                    <input class="form-control" type="number" name="minPrijs">
                                    <span>minPrijs</span>
                                </div>
                            </div>
                            <div class="col-auto">
                                <div class="input-group">
                                    <input class="form-control" type="number" name="maxPrijs">
                                    <span>maxPrijs</span>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <h3>categorie</h3>
                            <div class="col-auto">
                                <select name="categorie" class="form-select">
                                    <option th:selected="${param.categorie == null or param.categorie == ''}" value="">Maakt niet uit</option>
                                    <option value="Drank">Drank</option>
                                    <option value="Zuivel">Zuivel</option>
                                    <option value="Snacks">Snacks</option>
                                    <option value="Sauzen">Sauzen</option>
                                </select>
                            </div>
                        </div>

                        <div class="row border rounded-3">
                            <h3>biologisch</h3>
                            <div th:each="val,iter : ${ {'true','false',''} }" class="col-auto">
                                <div class="input-group border rounded-3">
                                    <input type="radio" th:value="${val}" name="isBiologisch"
                                           th:checked="${param.isBiologisch == null ? val == '' : param.isBiologisch[0] == val}">
                                    <span class="ms-3" th:text="${val == 'true'} ? 'ja' : (${val == 'false'} ? 'nee' : 'maakt niet uit')"></span>
                                </div>
                            </div>
                        </div>

                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">cancel</button>
                        <button class="btn btn-primary" type="submit">submit</button>
                    </div>

                </div>
            </form>
        </div>
    </div>

    <h2 class="text-center">Take your groceries, and we'll deliver them to you</h2>

    <div class="container-fluid">
        <div class="row justify-content-center g-1">

            <button class="btn btn-light col-10 d-md-none" data-bs-toggle="collapse" data-bs-target="#categories">categories</button>

            <!-- Sidebar -->
            <div class="col-10 col-lg-2 my-3 bg-white rounded-2 align-self-start">
                <div class="collapse d-lg-block" id="categories">
                    <ul class="list-unstyled ms-5">
                        <li><h2>Deals</h2></li>
                        <li><a>SuperDeals</a></li>
                        <li><a>Nieuwkomers</a></li>
                        <li><a>BestSellers</a></li>
                        <li><a>Favourieten</a></li>
                        <li><a>Verse producten</a></li>
                    </ul>
                </div>
            </div>

            <!-- Content -->
            <div class="col-12 col-lg-10">
                <div class="row justify-content-center">
                    <div class="col-10">

                        <!-- Toolbar -->
                        <div class="d-none d-xl-flex justify-content-between my-3 px-5 py-3 mb-5 bg-light rounded-3">
                            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#modal1">Filter by</button>
                            <div class="d-flex gap-2">
                                <button class="btn btn-primary text-nowrap" type="submit" form="form1">Search for products</button>
                                <input type="search" class="form-control" name="searchQuery" form="form1">
                            </div>
                            <div>
                                <a class="btn btn-primary">PreviousList</a>
                                <a class="btn btn-primary">NextList</a>
                            </div>
                        </div>

                        <!-- Product grid -->
                        <div class="row g-4">
                            <div class="col-lg-3 col-md-4 col-6"
                                 th:each="product : ${productlist}" th:object="${product}">
                                <div class="card h-100">
                                    <img src="/img/banana.jpg" alt="banana" class="card-img">
                                    <div class="card-body">
                                        <h2 class="card-title" th:text="*{productNaam}"></h2>
                                        <h3 th:text="|*{prijs} €|"></h3>
                                        <a class="btn btn-dark" th:href="@{/productdetails/{id}(id=${product.id})}">View more</a>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>

        </div>
    </div>

</main>

<footer></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>
</html>
