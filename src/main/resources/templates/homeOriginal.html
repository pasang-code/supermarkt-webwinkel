    <!doctype html>
    <html lang="en">
    <head th:replace="~{fragments/header::head}">

    </head>
    <body>

    <header th:insert="~{fragments/navbar::navigationBar}"></header>


    <main>


        <div class="modal" id="modal1" tabindex="-1">
            <div class="modal-dialog" style="max-width: 85vw;">
                <form id="form1" th:action="@{/home}" method="GET">
                <div class="modal-content">
                    <div class="modal-header">
                        <h2 class="modal-title">Filters</h2>
                    </div>

                    <div class="modal-body">

                        <div class="row">
                            <h3> naam</h3>
                            <div class="col">
                                <div  class="input-group">
                                    <input type="search" name="naam">
                                    <span class="ms-2"> naam </span>
                                </div>
                            </div>

                        </div>

                        <div class="row">
                            <h3>gewicht</h3>
                            <div class="col-auto">
                                <div class="input-group">
                                    <input type="number" class="form-control" name="gewicht" th:value="${param.gewicht}">
                                    <span class="ms-2">gram</span>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <h3>prijs</h3>
                            <div class="col-auto">
                                <div class="input-group">
                                    <input class="form-control" type="number" name="minPrijs">
                                    <span>minPrijs </span>
                                </div>
                            </div>
                            <div  class="col-auto">
                                <div class="input-group">
                                    <input class="form-control" type="number" name="maxPrijs">
                                    <span>maxPrijs </span>
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <h3>categorie</h3>
                            <div class="col-auto">
                                <div class="input-group ">
                                    <select name="categorie" class="form-select">
                                        <option th:selected="${param.categorie == null or param.categorie == '' }" value=""> Maakt niet uit </option>
                                        <option value="Drank" >
                                            Drank
                                        </option>
                                        <option value="Zuivel">
                                            Zuivel
                                        </option>
                                        <option value="Snacks">
                                            Snacks
                                        </option>
                                        <option value="Sauzen"> Sauzen
                                        </option>
                                    </select>
                                    </div>
                            </div>
                        </div>

                        <div class="row border rounded-3">
                        <h3> biologisch</h3>

                            <div class="col-auto">
                                <div class="input-group border rounded-3">
                                <input type="radio" value="true" name="isBiologisch" th:checked="${(param.isBiologisch != null and param.isBiologisch[0] == 'true')}">
                                <span class="ms-3">ja</span>
                               </div>
                                </div>
                                <div class="col-auto">
                                    <div class="input-group border rounded-3">
                                        <input type="radio" value="false" name="isBiologisch" th:checked="${(param.isBiologisch != null and param.isBiologisch[0] == 'false')}">
                                        <span class="ms-3">nee</span>
                                    </div>
                                </div>


                            <div class="col-auto">
                                <div class="input-group">
                                    <input type="radio" th:checked="${param.isBiologisch == null or param.isBiologisch[0] == ''}" value="" name="isBiologisch">
                                    <span class="ms-3">maakt niet uit</span>
                                </div>

                            </div>

                        </div>
                    <div class="modal-footer">
                        <div class="row justify-content-end">
                            <div class="col"> <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">cancel</button>
                                <button class="btn btn-primary" type="submit">submit</button>
                            </div>

                        </div>
                    </div>
                </div>

                </div>
                </form>
            </div>
        </div>

        <div class="container-fluid">
            <div class="quoteContainer p-5 text-end "> <h2> Take your groceries, and we'll deliver them to you </h2></div>

            <div class="row g-1">
                <div class="col-2 mt-5">
                    <ul class="mt-2 list-unstyled ms-5">
                        <li><h2>Deals</h2></li>
                        <li><a>SuperDeals</a></li>

                        <li><a>Nieuwkomers</a></li>
                        <li><a>BestSellers</a></li>
                        <li><a>Favourieten</a></li>

                    </ul>
                    <ul class="list-unstyled ms-5">
                    <li > <a>Verse producten</a></li>
                    </ul>
                </div>
              <div class="col-9">
                  <div class="row justify-content-between my-3">
                      <div class="col-3"> <button class=" btn btn-primary" type="button" data-bs-toggle="modal" data-bs-target="#modal1">Filter by</button></div>
                      <div class="search d-flex col-5">
                          <button class="btn btn-primary text-nowrap me-2" type="submit" form="form1">Search for products </button>
                          <input type="search" class="form-control" name="searchQuery" form="form1">
                      </div>
                      <div class="col-3 text-end">
                          <a class="btn btn-primary">PreviousList</a>
                          <a class="btn btn-primary">NextList</a>
                      </div>
                  </div>

                  <div class="row gx-5">

                      <div class="px-3 py-5 bg-light col-lg-3 col-md-4 col-sm-6 card-group" th:each="product:${productlist}" th:object="${product}">
                          <div class="card">
                              <img src="/img/banana.jpg" ALT="banana" class="card-img-top">
                              <div class="card-body">
                                  <h2 class="card-title" th:text="*{productNaam}"></h2>
                                  <h3 th:text="|*{prijs} €|"> </h3>
                                  <a class="btn btn-dark" th:href="@{/product-details{id}(id=${product.id})}" type="button">View more</a>
                              </div>
                          </div>
                      </div>

                  </div>
                  </div>


            </div>

        </div>
    </main>


    <footer> </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    </body>
    </html>
